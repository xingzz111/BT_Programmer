name: Build Win32 EXE (MinGW Cross-Compile)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mingw:
    name: Cross-compile with MinGW-w64 on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=i686-w64-mingw32.cmake \
            -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build DemoSDK_C only (no Controller.lib dependency)
        run: cmake --build build --target DemoSDK_C -- -j$(nproc)

      - name: Try building DemoSDK (needs import lib from Controller.dll)
        run: cmake --build build --target DemoSDK -- -j$(nproc) || echo "DemoSDK build failed (expected if gendef unavailable)"
        continue-on-error: true

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          find build -name "*.exe" -exec ls -lh {} \;
          find build -name "*.a" -exec ls -lh {} \;
          find build -name "*.def" -exec cat {} \; 2>/dev/null || true

      - name: Upload DemoSDK_C
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: DemoSDK_C-Win32
          path: build/DemoSDK_C.exe

      - name: Upload DemoSDK (if built)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: DemoSDK-Win32
          path: build/DemoSDK.exe
