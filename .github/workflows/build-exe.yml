name: Build Win32 EXE (MinGW Cross-Compile)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mingw:
    name: Cross-compile DemoSDK_C with MinGW-w64
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=i686-w64-mingw32.cmake

      - name: Build DemoSDK_C
        run: cmake --build build --target DemoSDK_C -- -j$(nproc)

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          ls -lh build/DemoSDK_C.exe

      - name: Upload DemoSDK_C
        uses: actions/upload-artifact@v4
        with:
          name: DemoSDK_C-Win32
          path: build/DemoSDK_C.exe
