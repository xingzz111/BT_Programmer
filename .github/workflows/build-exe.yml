name: Build Win32 EXE (MinGW Cross-Compile)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mingw:
    name: Cross-compile with MinGW-w64 on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 gendef

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=i686-w64-mingw32-windres \
            -DCMAKE_FIND_ROOT_PATH=/usr/i686-w64-mingw32

      - name: Build
        run: cmake --build build --config Release

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          find build -name "*.exe" -exec ls -lh {} \;

      - name: Upload DemoSDK
        uses: actions/upload-artifact@v4
        with:
          name: DemoSDK-Win32
          path: build/DemoSDK.exe

      - name: Upload DemoSDK_C
        uses: actions/upload-artifact@v4
        with:
          name: DemoSDK_C-Win32
          path: build/DemoSDK_C.exe
