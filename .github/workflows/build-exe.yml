name: Build Win32 EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mingw:
    name: Build with MinGW on Ubuntu (Free runner)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 gendef
          sudo update-alternatives --set i686-w64-mingw32-gcc /usr/bin/i686-w64-mingw32-gcc-posix
          sudo update-alternatives --set i686-w64-mingw32-g++ /usr/bin/i686-w64-mingw32-g++-posix

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_SYSTEM_PROCESSOR=x86 \
            -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=i686-w64-mingw32-windres

      - name: Build Release
        run: cmake --build build --config Release

      - name: Verify EXE files
        run: |
          echo "=== Build outputs ==="
          find build -name "*.exe" -exec ls -lh {} \;
          echo "=== File verification ==="
          for f in $(find build -name "*.exe"); do
            file "$f"
          done

      - name: Upload DemoSDK
        uses: actions/upload-artifact@v4
        with:
          name: DemoSDK-MinGW
          path: build/DemoSDK.exe

      - name: Upload DemoSDK_C
        uses: actions/upload-artifact@v4
        with:
          name: DemoSDK_C-MinGW
          path: build/DemoSDK_C.exe
